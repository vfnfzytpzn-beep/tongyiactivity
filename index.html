<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通义大模型生态赋能中心 - 活动资讯</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <div class="logo-icon">通</div>
            <span class="logo-text">通义大模型生态赋能中心</span>
        </a>
        <div class="nav-links">
            <a href="index.html" class="active">活动首页</a>
            <a href="publish.html">发布活动</a>
            <a href="admin.html">后台管理</a>
        </div>
    </nav>

    <!-- Hero区域 -->
    <section class="hero">
        <div class="hero-content">
            <h1>通义大模型生态赋能中心</h1>
            <p>汇聚前沿AI技术活动，连接开发者与产业生态，共同探索大模型赋能未来</p>
        </div>
    </section>

    <!-- 搜索与筛选 -->
    <div class="container">
        <div style="display:flex; gap:12px; align-items:center; padding-top:30px; flex-wrap:wrap;">
            <input type="text" id="searchInput" class="form-control" placeholder="搜索活动名称..." style="max-width:300px;">
            <select id="categoryFilter" class="form-control" style="max-width:160px;">
                <option value="">全部分类</option>
                <option value="技术沙龙">技术沙龙</option>
                <option value="行业峰会">行业峰会</option>
                <option value="培训课程">培训课程</option>
                <option value="工作坊">工作坊</option>
                <option value="线上直播">线上直播</option>
            </select>
            <select id="statusFilter" class="form-control" style="max-width:140px;">
                <option value="">全部状态</option>
                <option value="active">报名中</option>
                <option value="ended">已结束</option>
            </select>
        </div>

        <h2 class="section-title">最新活动</h2>

        <!-- 活动列表 -->
        <div class="events-grid" id="eventsGrid">
            <!-- 动态渲染 -->
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">📭</div>
            <h3>暂无相关活动</h3>
            <p>试试其他筛选条件，或<a href="publish.html" style="color:var(--primary);">发布新活动</a></p>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 通义大模型生态赋能中心 | 活动资讯平台</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // 渲染活动列表
        function renderEvents() {
            const events = EventManager.getAll();
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const status = document.getElementById('statusFilter').value;

            let filtered = events.filter(e => {
                let match = true;
                if (keyword) match = match && e.title.toLowerCase().includes(keyword);
                if (category) match = match && e.category === category;
                if (status) match = match && e.status === status;
                return match;
            });

            const grid = document.getElementById('eventsGrid');
            const emptyState = document.getElementById('emptyState');

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            grid.innerHTML = filtered.map(event => `
                <div class="card event-card" onclick="location.href='detail.html?id=${event.id}'">
                    <div class="card-img">
                        ${event.cover 
                            ? `<img src="${event.cover}" alt="${event.title}">` 
                            : `<span>${Utils.getCategoryIcon(event.category)}</span>`
                        }
                    </div>
                    <div class="card-body">
                        <h3>${event.title}</h3>
                        <div class="card-meta">
                            <span>📅 ${event.date} ${event.time || ''}</span>
                            <span>📍 ${event.location}</span>
                            <span>👤 ${event.organizer || '通义大模型生态赋能中心'}</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <span class="tag">${event.category || '其他'}</span>
                        <span class="status ${event.status === 'active' ? 'status-active' : 'status-ended'}">
                            ${Utils.getStatusText(event.status)}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        // 事件监听
        document.getElementById('searchInput').addEventListener('input', renderEvents);
        document.getElementById('categoryFilter').addEventListener('change', renderEvents);
        document.getElementById('statusFilter').addEventListener('change', renderEvents);

        // 初始化
        renderEvents();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布活动 - 通义大模型生态赋能中心</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <div class="logo-icon">通</div>
            <span class="logo-text">通义大模型生态赋能中心</span>
        </a>
        <div class="nav-links">
            <a href="index.html">活动首页</a>
            <a href="publish.html" class="active">发布活动</a>
            <a href="admin.html">后台管理</a>
        </div>
    </nav>

    <!-- 发布表单区域 -->
    <div class="container" style="max-width:800px; padding:40px 20px;">
        <h2 class="section-title">发布新活动</h2>
        <p style="color:var(--text-light); margin-bottom:30px; font-size:14px;">填写活动信息并上传相关素材，发布后可在后台管理中进行编辑修改。</p>

        <form id="publishForm" class="card" style="padding:30px;">
            <!-- 基本信息 -->
            <div class="form-group">
                <label>活动名称 <span class="required">*</span></label>
                <input type="text" class="form-control" id="title" placeholder="请输入活动名称" required>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div class="form-group">
                    <label>活动日期 <span class="required">*</span></label>
                    <input type="date" class="form-control" id="date" required>
                </div>
                <div class="form-group">
                    <label>活动时间</label>
                    <input type="time" class="form-control" id="time">
                </div>
            </div>

            <div class="form-group">
                <label>活动地点 <span class="required">*</span></label>
                <input type="text" class="form-control" id="location" placeholder="例如：杭州·阿里巴巴西溪园区" required>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div class="form-group">
                    <label>活动分类 <span class="required">*</span></label>
                    <select class="form-control" id="category" required>
                        <option value="">请选择分类</option>
                        <option value="技术沙龙">技术沙龙</option>
                        <option value="行业峰会">行业峰会</option>
                        <option value="培训课程">培训课程</option>
                        <option value="工作坊">工作坊</option>
                        <option value="线上直播">线上直播</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>活动状态</label>
                    <select class="form-control" id="status">
                        <option value="active">报名中</option>
                        <option value="upcoming">即将开始</option>
                        <option value="ended">已结束</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>主办方</label>
                <input type="text" class="form-control" id="organizer" placeholder="请输入主办方名称" value="通义大模型生态赋能中心">
            </div>

            <div class="form-group">
                <label>活动描述 <span class="required">*</span></label>
                <textarea class="form-control" id="description" placeholder="请输入活动详细描述、议程安排等信息..." rows="6" required></textarea>
            </div>

            <!-- 封面上传 -->
            <div class="form-group">
                <label>活动封面图</label>
                <div class="upload-area" id="coverUploadArea" onclick="document.getElementById('coverInput').click()">
                    <div class="upload-icon">🖼️</div>
                    <p>点击或拖拽上传封面图片</p>
                    <p style="font-size:12px; color:#9ca3af; margin-top:4px;">支持 JPG、PNG 格式，建议尺寸 1200x600</p>
                </div>
                <input type="file" id="coverInput" accept="image/*" style="display:none;" onchange="handleCoverUpload(this)">
                <div class="upload-preview" id="coverPreview"></div>
            </div>

            <!-- 素材上传 -->
            <div class="form-group">
                <label>活动素材图片</label>
                <div class="upload-area" id="imagesUploadArea" onclick="document.getElementById('imagesInput').click()">
                    <div class="upload-icon">📸</div>
                    <p>点击上传活动素材图片（可多选）</p>
                    <p style="font-size:12px; color:#9ca3af; margin-top:4px;">支持多张图片上传，每张不超过 2MB</p>
                </div>
                <input type="file" id="imagesInput" accept="image/*" multiple style="display:none;" onchange="handleImagesUpload(this)">
                <div class="upload-preview" id="imagesPreview"></div>
            </div>

            <!-- 提交按钮 -->
            <div style="display:flex; gap:12px; margin-top:10px;">
                <button type="submit" class="btn btn-primary" style="flex:1;">发布活动</button>
                <button type="reset" class="btn btn-outline" onclick="resetForm()">重置表单</button>
            </div>
        </form>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 通义大模型生态赋能中心 | 活动资讯平台</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        let coverBase64 = '';
        let imagesBase64 = [];

        // 处理封面上传
        async function handleCoverUpload(input) {
            const file = input.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                Utils.showToast('封面图片不能超过5MB', 'error');
                return;
            }

            coverBase64 = await Utils.fileToBase64(file);
            document.getElementById('coverPreview').innerHTML = `
                <div class="preview-item">
                    <img src="${coverBase64}" alt="封面预览">
                    <button class="remove-btn" onclick="removeCover(event)">×</button>
                </div>
            `;
        }

        function removeCover(e) {
            e.stopPropagation();
            coverBase64 = '';
            document.getElementById('coverPreview').innerHTML = '';
            document.getElementById('coverInput').value = '';
        }

        // 处理素材图片上传
        async function handleImagesUpload(input) {
            const files = Array.from(input.files);
            
            for (const file of files) {
                if (file.size > 2 * 1024 * 1024) {
                    Utils.showToast(`${file.name} 超过2MB，已跳过`, 'error');
                    continue;
                }
                const base64 = await Utils.fileToBase64(file);
                imagesBase64.push(base64);
            }

            renderImagesPreview();
        }

        function renderImagesPreview() {
            const container = document.getElementById('imagesPreview');
            container.innerHTML = imagesBase64.map((img, index) => `
                <div class="preview-item">
                    <img src="${img}" alt="素材${index + 1}">
                    <button class="remove-btn" onclick="removeImage(event, ${index})">×</button>
                </div>
            `).join('');
        }

        function removeImage(e, index) {
            e.stopPropagation();
            imagesBase64.splice(index, 1);
            renderImagesPreview();
        }

        // 重置表单
        function resetForm() {
            coverBase64 = '';
            imagesBase64 = [];
            document.getElementById('coverPreview').innerHTML = '';
            document.getElementById('imagesPreview').innerHTML = '';
        }

        // 提交表单
        document.getElementById('publishForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const eventData = {
                title: document.getElementById('title').value.trim(),
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                location: document.getElementById('location').value.trim(),
                category: document.getElementById('category').value,
                status: document.getElementById('status').value,
                organizer: document.getElementById('organizer').value.trim(),
                description: document.getElementById('description').value.trim(),
                cover: coverBase64,
                images: imagesBase64
            };

            if (!eventData.title || !eventData.date || !eventData.location || !eventData.category || !eventData.description) {
                Utils.showToast('请填写所有必填项', 'error');
                return;
            }

            EventManager.add(eventData);
            Utils.showToast('活动发布成功！');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        });
    </script>
</body>
</html>

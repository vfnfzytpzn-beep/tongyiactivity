<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 通义大模型生态赋能中心</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <div class="logo-icon">通</div>
            <span class="logo-text">通义大模型生态赋能中心</span>
        </a>
        <div class="nav-links">
            <a href="index.html">活动首页</a>
            <a href="publish.html">发布活动</a>
            <a href="admin.html" class="active">后台管理</a>
        </div>
    </nav>

    <!-- 管理区域 -->
    <div class="container" style="padding:40px 20px;">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
            <h2 class="section-title" style="padding-top:0;">活动管理</h2>
            <div style="display:flex; gap:10px; align-items:center;">
                <span style="font-size:14px; color:var(--text-light);" id="eventCount"></span>
                <a href="publish.html" class="btn btn-primary btn-sm">+ 发布新活动</a>
            </div>
        </div>

        <!-- 管理表格 -->
        <div style="overflow-x:auto; margin-top:20px;">
            <table class="admin-table" id="adminTable">
                <thead>
                    <tr>
                        <th>活动名称</th>
                        <th>日期</th>
                        <th>地点</th>
                        <th>分类</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">📋</div>
            <h3>暂无活动数据</h3>
            <p>点击上方"发布新活动"按钮添加第一个活动</p>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2>编辑活动</h2>
            <form id="editForm">
                <input type="hidden" id="editId">
                
                <div class="form-group">
                    <label>活动名称 <span class="required">*</span></label>
                    <input type="text" class="form-control" id="editTitle" required>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                    <div class="form-group">
                        <label>活动日期 <span class="required">*</span></label>
                        <input type="date" class="form-control" id="editDate" required>
                    </div>
                    <div class="form-group">
                        <label>活动时间</label>
                        <input type="time" class="form-control" id="editTime">
                    </div>
                </div>

                <div class="form-group">
                    <label>活动地点 <span class="required">*</span></label>
                    <input type="text" class="form-control" id="editLocation" required>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                    <div class="form-group">
                        <label>活动分类</label>
                        <select class="form-control" id="editCategory">
                            <option value="技术沙龙">技术沙龙</option>
                            <option value="行业峰会">行业峰会</option>
                            <option value="培训课程">培训课程</option>
                            <option value="工作坊">工作坊</option>
                            <option value="线上直播">线上直播</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>活动状态</label>
                        <select class="form-control" id="editStatus">
                            <option value="active">报名中</option>
                            <option value="upcoming">即将开始</option>
                            <option value="ended">已结束</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>主办方</label>
                    <input type="text" class="form-control" id="editOrganizer">
                </div>

                <div class="form-group">
                    <label>活动描述</label>
                    <textarea class="form-control" id="editDescription" rows="5"></textarea>
                </div>

                <!-- 封面上传 -->
                <div class="form-group">
                    <label>活动封面图</label>
                    <div class="upload-area" onclick="document.getElementById('editCoverInput').click()" style="padding:20px;">
                        <p>点击更换封面图片</p>
                    </div>
                    <input type="file" id="editCoverInput" accept="image/*" style="display:none;" onchange="handleEditCoverUpload(this)">
                    <div class="upload-preview" id="editCoverPreview"></div>
                </div>

                <!-- 素材上传 -->
                <div class="form-group">
                    <label>活动素材图片</label>
                    <div class="upload-area" onclick="document.getElementById('editImagesInput').click()" style="padding:20px;">
                        <p>点击添加素材图片（可多选）</p>
                    </div>
                    <input type="file" id="editImagesInput" accept="image/*" multiple style="display:none;" onchange="handleEditImagesUpload(this)">
                    <div class="upload-preview" id="editImagesPreview"></div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeEditModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存修改</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal" style="max-width:400px; text-align:center;">
            <h2 style="color:#ef4444;">确认删除</h2>
            <p style="margin:20px 0; color:var(--text-light);">确定要删除活动 "<span id="deleteEventName"></span>" 吗？此操作不可恢复。</p>
            <div class="modal-actions" style="justify-content:center;">
                <button class="btn btn-outline" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 通义大模型生态赋能中心 | 活动资讯平台</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        let editCoverBase64 = '';
        let editImagesBase64 = [];

        // 渲染管理列表
        function renderAdminTable() {
            const events = EventManager.getAll();
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            const countEl = document.getElementById('eventCount');

            countEl.textContent = `共 ${events.length} 个活动`;

            if (events.length === 0) {
                document.querySelector('.admin-table').style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            document.querySelector('.admin-table').style.display = 'table';
            emptyState.style.display = 'none';

            tbody.innerHTML = events.map(event => `
                <tr>
                    <td style="max-width:250px;">
                        <strong style="display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${event.title}</strong>
                        <small style="color:var(--text-light);">${event.organizer || ''}</small>
                    </td>
                    <td>${event.date}</td>
                    <td>${event.location}</td>
                    <td><span class="tag">${event.category || '其他'}</span></td>
                    <td>
                        <span class="status ${event.status === 'active' ? 'status-active' : 'status-ended'}">
                            ${Utils.getStatusText(event.status)}
                        </span>
                    </td>
                    <td>
                        <div class="actions">
                            <button class="btn btn-outline btn-sm" onclick="openEditModal('${event.id}')">编辑</button>
                            <button class="btn btn-danger btn-sm" onclick="openDeleteModal('${event.id}', '${event.title.replace(/'/g, "\\'")}')">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 打开编辑模态框
        function openEditModal(id) {
            const event = EventManager.getById(id);
            if (!event) return;

            document.getElementById('editId').value = id;
            document.getElementById('editTitle').value = event.title;
            document.getElementById('editDate').value = event.date;
            document.getElementById('editTime').value = event.time || '';
            document.getElementById('editLocation').value = event.location;
            document.getElementById('editCategory').value = event.category || '其他';
            document.getElementById('editStatus').value = event.status;
            document.getElementById('editOrganizer').value = event.organizer || '';
            document.getElementById('editDescription').value = event.description || '';

            // 加载现有封面
            editCoverBase64 = event.cover || '';
            if (editCoverBase64) {
                document.getElementById('editCoverPreview').innerHTML = `
                    <div class="preview-item">
                        <img src="${editCoverBase64}" alt="封面">
                        <button class="remove-btn" onclick="removeEditCover(event)">×</button>
                    </div>
                `;
            } else {
                document.getElementById('editCoverPreview').innerHTML = '';
            }

            // 加载现有素材
            editImagesBase64 = event.images ? [...event.images] : [];
            renderEditImagesPreview();

            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        // 处理编辑时封面上传
        async function handleEditCoverUpload(input) {
            const file = input.files[0];
            if (!file) return;
            editCoverBase64 = await Utils.compressImage(file, { maxSize: 1280, quality: 0.7 });
            document.getElementById('editCoverPreview').innerHTML = `
                <div class="preview-item">
                    <img src="${editCoverBase64}" alt="封面">
                    <button class="remove-btn" onclick="removeEditCover(event)">×</button>
                </div>
            `;
        }

        function removeEditCover(e) {
            e.stopPropagation();
            editCoverBase64 = '';
            document.getElementById('editCoverPreview').innerHTML = '';
            document.getElementById('editCoverInput').value = '';
        }

        // 处理编辑时素材上传
        async function handleEditImagesUpload(input) {
            const files = Array.from(input.files);
            for (const file of files) {
                if (file.size > 5 * 1024 * 1024) continue;
                const base64 = await Utils.compressImage(file, { maxSize: 1024, quality: 0.65 });
                editImagesBase64.push(base64);
            }
            renderEditImagesPreview();
            input.value = '';
        }

        function renderEditImagesPreview() {
            document.getElementById('editImagesPreview').innerHTML = editImagesBase64.map((img, index) => `
                <div class="preview-item">
                    <img src="${img}" alt="素材${index + 1}">
                    <button class="remove-btn" onclick="removeEditImage(event, ${index})">×</button>
                </div>
            `).join('');
        }

        function removeEditImage(e, index) {
            e.stopPropagation();
            editImagesBase64.splice(index, 1);
            renderEditImagesPreview();
        }

        // 提交编辑
        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            
            const updatedData = {
                title: document.getElementById('editTitle').value.trim(),
                date: document.getElementById('editDate').value,
                time: document.getElementById('editTime').value,
                location: document.getElementById('editLocation').value.trim(),
                category: document.getElementById('editCategory').value,
                status: document.getElementById('editStatus').value,
                organizer: document.getElementById('editOrganizer').value.trim(),
                description: document.getElementById('editDescription').value.trim(),
                cover: editCoverBase64,
                images: editImagesBase64
            };

            const result = EventManager.update(id, updatedData);
            if (!result.success) {
                Utils.showToast(result.message || '保存失败', 'error');
                return;
            }
            closeEditModal();
            renderAdminTable();
            Utils.showToast('活动已更新成功！');
        });

        // 删除相关
        let deleteTargetId = '';

        function openDeleteModal(id, name) {
            deleteTargetId = id;
            document.getElementById('deleteEventName').textContent = name;
            document.getElementById('deleteModal').classList.add('active');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
            deleteTargetId = '';
        }

        document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
            if (deleteTargetId) {
                EventManager.delete(deleteTargetId);
                closeDeleteModal();
                renderAdminTable();
                Utils.showToast('活动已删除');
            }
        });

        // 点击模态框外部关闭
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });
        document.getElementById('deleteModal').addEventListener('click', function(e) {
            if (e.target === this) closeDeleteModal();
        });

        // 初始化
        renderAdminTable();
    </script>
</body>
</html>
